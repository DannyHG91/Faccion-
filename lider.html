<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control del Líder</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121214; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1f1f23; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 400px; text-align: center; border: 1px solid #333; }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #28a745; color: white; font-size: 16px; transition: background 0.2s; }
        button:hover { background: #218838; }
        .credenciales { background: #2a2a30; padding: 15px; border-radius: 6px; text-align: center; border: 1px dashed #28a745; margin-top: 15px; position: relative; }
        .token-text { font-family: monospace; font-size: 22px; color: #28a745; font-weight: bold; letter-spacing: 1px; display: block; margin-bottom: 10px; }
        
        /* 📋 BOTÓN DE COPIA RÁPIDA */
        .btn-copy { background: #007bff; font-size: 14px; padding: 8px; margin: 5px 0 0 0; width: auto; display: inline-block; padding-left: 20px; padding-right: 20px; }
        .btn-copy:hover { background: #0056b3; }
        .btn-copied { background: #6c757d !important; } /* Color gris cuando ya se copió */
        
        .hidden { display: none !important; }
        .logout { background: #dc3545; margin-top: 20px; }
        .logout:hover { background: #bd2130; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Panel de Control</h2>
        <p>Comandante de la Facción: <strong id="lblFaction" style="color: #007bff;">...</strong></p>
        
        <button onclick="generarTokenAcceso()">Generar Código de Pase Único</button>

        <div id="resultado" class="hidden">
            <div class="credenciales">
                <span style="color: #aaa; font-size: 13px;">TOKEN DE ACCESO:</span>
                <span id="resToken" class="token-text"></span>
                
                <!-- NEW: Botón de Copia Rápida -->
                <button id="btnCopy" class="btn-copy" onclick="copiarToken()">📋 Copiar Código</button>
            </div>
            <p style="color: #888; font-size: 13px;"><small>Copia este código y entrégaselo a tu recluta para acceso inmediato.</small></p>
        </div>
        
        <hr style="border-color: #333; margin-top: 25px;">
        <button onclick="window.location.href='/logout'" class="logout">Cerrar Sesión</button>
    </div>

    <script {nonce}>
        let tokenActual = "";

        async function cargarInfoLider() {
            const res = await fetch('/api/info-lider');
            if(res.ok) {
                const datos = await res.json();
                document.getElementById("lblFaction").innerText = datos.faction;
            } else { window.location.href = '/'; }
        }

        async function generarTokenAcceso() {
            // Restaurar estado del botón de copia si se genera uno nuevo
            const btn = document.getElementById("btnCopy");
            btn.innerText = "📋 Copiar Código";
            btn.classList.remove("btn-copied");

            const response = await fetch('/api/generar-token', { method: 'POST' });
            const datos = await response.json();

            tokenActual = datos.token;
            document.getElementById("resToken").innerText = datos.token;
            document.getElementById("resultado").classList.remove("hidden");
        }

        // ⚡ FUNCIÓN DE COPIADO AUTOMÁTICO EN PORTAPAPELES
        function copiarToken() {
            if (!tokenActual) return;
            
            // Usar la API nativa de navegación para copiar texto de forma limpia
            navigator.clipboard.writeText(tokenActual).then(() => {
                const btn = document.getElementById("btnCopy");
                btn.innerText = "✅ ¡Copiado!";
                btn.classList.add("btn-copied");
            }).catch(err => {
                alert("No se pudo copiar automáticamente. Por favor selecciónalo manualmente.");
            });
        }

        cargarInfoLider();
    </script>
</body>
</html>
