<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Forzado de escala estricto para evitar zoom táctil y fijar vista móvil -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>[ TOKEN LIDER]</title>

    <style>
        /* Variables Operativas del Alto Mando: Oro de Prestigio Preponderante */
        :root {
            --stealth-dark: #020407;
            --glass-core: rgba(14, 21, 31, 0.75);
            --gold-prestige: #dcae3b;
            --gold-glow: rgba(220, 174, 59, 0.25);
            --laser-cyan: #00d9ff;
            --sub-slate: #56687a;
            --pure-light: #f1f5f9;
            --alert-red: #ff4a4a;
            --grid-line: rgba(220, 174, 59, 0.015);
        }

        html, body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Corta desplazamientos fuera de foco */
            background-color: var(--stealth-dark);
        }

        body {
            background-color: var(--stealth-dark);
            color: var(--pure-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Bloquea el scroll elástico de iOS y rebotes de Android */
            position: relative;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            
            /* Blindaje total contra resaltado de textos al presionar la pantalla o buscar */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* INGENIERÍA DE HARDWARE EN ANIMACIONES DE ALTA TASA DE REFRESO (60 FPS) */
        .mainframe-container, .laser-border, .token-display-box, .radar-sweep, .radar-blip {
            -webkit-transform: translate3d(0,0,0);
            transform: translate3d(0,0,0);
            will-change: transform, opacity;
        }
                /* CAPA DEL RADAR MILITAR MEJORADO DE AVIACIÓN (60 FPS) */
        .radar-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        /* Chasis Circular del Sonar con Líneas más Visibles */
        .radar-screen {
            width: 92vw; height: 92vw;
            max-width: 440px; max-height: 440px;
            border-radius: 50%;
            border: 2px solid rgba(220, 174, 59, 0.25); /* Línea externa más gruesa */
            box-shadow: 0 0 50px rgba(220, 174, 59, 0.08);
            position: relative;
            background: 
                radial-gradient(circle, transparent 30%, rgba(220, 174, 59, 0.06) 31%, transparent 32%, 
                                transparent 60%, rgba(220, 174, 59, 0.06) 61%, transparent 62%);
        }

        /* Ejes de Coordenadas Cruzadas Reforzados */
        .radar-screen::before, .radar-screen::after {
            content: '';
            position: absolute;
            background-color: rgba(220, 174, 59, 0.15); /* Más visible */
        }
        .radar-screen::before { top: 0; left: 50%; width: 1.5px; height: 100%; }
        .radar-screen::after { top: 50%; left: 0; width: 100%; height: 1.5px; }

        /* Haz de Luz Giratorio de 360 Grados */
        .radar-sweep {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--gold-prestige) 0deg, rgba(220, 174, 59, 0.25) 12deg, transparent 60deg);
            animation: radar-spin 4s infinite linear;
            z-index: 3;
        }

        @keyframes radar-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* OBJETIVOS EN MOVIENTO (BLIPS TÁCTICOS) ATRIBUIDOS A GPU */
        .radar-blip {
            position: absolute;
            width: 6px; height: 6px;
            background-color: #00ff66; /* Verde militar brillante para contraste */
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff66, 0 0 20px #00ff66;
            z-index: 4;
            opacity: 0;
        }

        /* Animaciones asíncronas para simular escaneo en tiempo real */
        .target-alpha { top: 25%; left: 30%; animation: target-glow 4s infinite ease-in-out; }
        .target-bravo { top: 65%; left: 75%; animation: target-glow 4s infinite ease-in-out 1.2s; }
        .target-charlie { top: 15%; left: 68%; animation: target-glow 4s infinite ease-in-out 2.5s; }

        @keyframes target-glow {
            0%, 100% { opacity: 0; transform: scale3d(0.5, 0.5, 1); }
            40%, 60% { opacity: 0.9; transform: scale3d(1.1, 1.1, 1); }
        }
                /* CONSOLA CENTRAL DEL COMANDANTE EN JEFE (INTERFAZ GIGANTE) */
        .mainframe-container {
            background: rgba(7, 13, 22, 0.65); /* Opacidad de cristal para revelar el radar de fondo */
            border: 1px solid rgba(220, 174, 59, 0.2);
            padding: 30px 20px;
            width: 96vw;          /* Ajustado al 96% del ancho del navegador */
            max-width: 460px;
            height: 94vh;         /* Estirado al 94% del alto vertical útil */
            max-height: 94vh;
            box-sizing: border-box;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.85);
            position: relative;
            z-index: 5;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* LÁSER PERIMETRAL DE ORO COMPLEMENTARIO A 60 FPS */
        .laser-border {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--gold-prestige), transparent);
            z-index: 6;
        }
        .lb-top { top: 0; left: -100%; width: 100%; height: 1px; animation: laser-h 4.5s infinite linear; }
        .lb-bottom { bottom: 0; right: -100%; width: 100%; height: 1px; animation: laser-h-rev 4.5s infinite linear; }

        @keyframes laser-h { 0% { transform: translate3d(-100%, 0, 0); } 100% { transform: translate3d(100%, 0, 0); } }
        @keyframes laser-h-rev { 0% { transform: translate3d(100%, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* Ángulos Estructurales de Oro Militar */
        .corner-bracket {
            position: absolute;
            width: 14px; height: 14px;
            border: 2px solid rgba(220, 174, 59, 0.4);
            z-index: 7;
        }
        .tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        /* CABECERA DE ALTO RANGO */
        .header-shield {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(220, 174, 59, 0.15);
            padding-bottom: 15px;
        }

        .sys-badge {
            font-size: 10px;
            font-family: monospace;
            color: var(--gold-prestige);
            letter-spacing: 3px;
            font-weight: bold;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            margin: 6px 0 0 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--pure-light);
        }

        .faction-title {
            font-size: 13px;
            color: var(--laser-cyan);
            letter-spacing: 1.5px;
            font-family: monospace;
            margin-top: 5px;
            font-weight: 600;
        }

        /* BOTÓN MODERNO DE GENERACIÓN AMPLIADO */
        .btn-generate {
            display: block;
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, rgba(220, 174, 59, 0.03), rgba(220, 174, 59, 0.08));
            border: 1px solid var(--gold-prestige);
            color: var(--gold-prestige);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            box-sizing: border-box;
            border-radius: 3px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-generate:active {
            background: rgba(220, 174, 59, 0.15);
            box-shadow: 0 0 25px var(--gold-glow);
            transform: scale3d(0.99, 0.99, 1);
        }

        /* VISUALIZADOR DE CRISTAL CON COPIA RÁPIDA (60 FPS) */
        .token-display-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(220, 174, 59, 0.25);
            border-radius: 3px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            animation: pane-appear 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .token-display-box:active {
            background: rgba(220, 174, 59, 0.04);
            border-color: var(--gold-prestige);
        }

        @keyframes pane-appear {
            from { opacity: 0; transform: translate3d(0, 10px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        .token-label {
            font-size: 9px;
            font-family: monospace;
            color: var(--sub-slate);
            letter-spacing: 2px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .token-string {
            font-size: 20px;
            font-family: monospace;
            color: var(--pure-light);
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* Indicador de Portapapeles Flotante */
        .copy-toast {
            font-size: 9px;
            font-family: monospace;
            color: var(--laser-cyan);
            letter-spacing: 1px;
            margin-top: 6px;
            opacity: 0.8;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        /* BOTÓN DE DESCONEXIÓN TÁCTICA */
        .logout-zone {
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 15px;
        }

        .btn-logout {
            display: block;
            width: 100%;
            padding: 16px;
            background: rgba(255, 74, 74, 0.02);
            border: 1px dashed rgba(255, 74, 74, 0.3);
            border-radius: 3px;
            color: var(--alert-red);
            text-align: center;
            text-decoration: none;
            font-size: 11px;
            font-family: monospace;
            font-weight: 600;
            letter-spacing: 2px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-logout:active {
            background: rgba(255, 74, 74, 0.12);
            border-color: var(--alert-red);
            box-shadow: 0 0 15px rgba(255, 74, 74, 0.15);
        }
    </style>
</head>
<body>

    <!-- CAPA DEL RADAR MILITAR DE AVIACIÓN REFORZADO CON BLIPS TÁCTICOS -->
    <div class="radar-container">
        <div class="radar-screen">
            <div class="radar-sweep"></div>
            <div class="radar-blip target-alpha"></div>
            <div class="radar-blip target-bravo"></div>
            <div class="radar-blip target-charlie"></div>
        </div>
    </div>

    <div class="mainframe-container">
        <!-- Haz de luz perimetral en oro -->
        <div class="laser-border lb-top"></div>
        <div class="laser-border lb-bottom"></div>

        <!-- Ángulos estructurales fijados -->
        <div class="corner-bracket tl"></div>
        <div class="corner-bracket tr"></div>
        <div class="corner-bracket bl"></div>
        <div class="corner-bracket br"></div>

        <!-- Cabecera de Alto Rango -->
        <div class="header-shield">
            <div class="sys-badge">✦ COMANDO GENERAL DE MESA ✦</div>
            <h1>SISTEMA DE CONTROL</h1>
            <div class="faction-title" id="factionDisplay">FACCIÓN: CARGANDO...</div>
        </div>

        <!-- Accionador Crítico de Tokens -->
        <button class="btn-generate" id="btnGenerar">GENERAR TOKEN ENCRIPTADO</button>

        <!-- Visualizador de Código Criptográfico con Copia Rápida -->
        <div class="token-display-box" id="tokenBox" title="Toque para copiar el código">
            <div class="token-label">Código Alfa (Toque para copiar)</div>
            <div class="token-string" id="tokenTexto">CBR-XXXX-XXXX</div>
            <div class="copy-toast" id="copyToast">[ TOQUE PARA COPIAR RÁPIDO ]</div>
        </div>

        <!-- Zona de Desconexión del Comando -->
        <div class="logout-zone">
            <a href="/logout" class="btn-logout" id="btnDisconnect">[ TERMINAR TRANSMISIÓN / DESCONECTAR ]</a>
        </div>
    </div>

    <!-- CONTROLADOR JAVASCRIPT Y MOTOR DE AUDIO DEL ALTO MANDO -->
    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Tono: Pulso doble agudo del Alto Mando
        function playCommandSound() {
            initAudio();
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(1500, audioCtx.currentTime);
            gain1.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.04);

            setTimeout(() => {
                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(1900, audioCtx.currentTime);
                gain2.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.04);
            }, 40);
        }

        // Tono: Pulso descendente de desconexión o fallo
        function playDisconnectSound() {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }
                // Cargar los datos de la facción del Líder logueado desde la API
        fetch('/api/info-lider')
            .then(res => res.json())
            .then(data => {
                if(data.faction) {
                    document.getElementById('factionDisplay').innerText = `FACCIÓN ASIGNADA: ${data.faction.toUpperCase()}`;
                }
            })
            .catch(() => {
                document.getElementById('factionDisplay').innerText = `ENLACE DE DATOS MILITAR`;
            });

        // Escucha táctil obligatoria en dispositivos móviles para permisos de audio
        document.body.addEventListener('touchstart', initAudio, {passive: true});

        // Ejecutar llamada a la API interna para crear y persistir el Token
        document.getElementById('btnGenerar').addEventListener('click', () => {
            playCommandSound();
            fetch('/api/generar-token', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if(data.token) {
                        document.getElementById('tokenTexto').innerText = data.token.trim();
                        document.getElementById('copyToast').innerText = "[ TOQUE PARA COPIAR RÁPIDO ]";
                        document.getElementById('copyToast').style.color = "var(--laser-cyan)";
                        document.getElementById('tokenBox').style.display = 'block';
                    }
                })
                .catch(() => {
                    alert("Falla de transmisión crítica con el almacenamiento.");
                });
        });

        // FUNCIÓN TÁCTICA DE TRANSFERENCIA BLINDADA (EVITA CARACTERES INVISIBLES)
        function forzarCopiadoToken(texto) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(texto);
            } else {
                // Soporte de respaldo (Fallback) para navegadores integrados de apps móviles (Discord, etc.)
                return new Promise((resolve, reject) => {
                    const textArea = document.createElement("textarea");
                    textArea.value = texto;
                    textArea.style.position = "fixed";
                    textArea.style.opacity = "0";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        if (document.execCommand('copy')) resolve();
                        else reject(new Error('Falla de sistema en execCommand'));
                    } catch (err) { reject(err); }
                    document.body.removeChild(textArea);
                });
            }
        }

        // SISTEMA DE COPIA RÁPIDA AL PORTAPAPELES
        document.getElementById('tokenBox').addEventListener('click', () => {
            // El uso de .trim() remueve cualquier residuo, tabulación o salto de línea fantasma
            const tokenTexto = document.getElementById('tokenTexto').innerText.trim();
            initAudio();

            // Sonido de confirmación de copia rápida (pulso ultra rápido de éxito)
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1700, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);

            // Ejecución del portapapeles blindado
            forzarCopiadoToken(tokenTexto)
                .then(() => {
                    const toast = document.getElementById('copyToast');
                    toast.innerText = "✓ COPIADO AL PORTAPAPELES TÁCTICO";
                    toast.style.color = "#00ff66"; // Cambia temporalmente a verde éxito
                })
                .catch(() => {
                    document.getElementById('copyToast').innerText = "ERROR AL COPIAR EL CÓDIGO";
                    document.getElementById('copyToast').style.color = "var(--alert-red)";
                });
        });

        // SISTEMA DE DESCONEXIÓN CON RETRASO CONTROLADO PARA AUDIO
        document.getElementById('btnDisconnect').addEventListener('click', function(e) {
            e.preventDefault();
            const destinationUrl = this.getAttribute('href');
            playDisconnectSound();

            // Retardo controlado para que el navegador de Android/iOS procese la bocina antes de saltar
            setTimeout(() => {
                window.location.href = destinationUrl;
            }, 120);
        });
    </script>
</body>
</html>
