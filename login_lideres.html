<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Forzado de escala estricto para evitar zoom táctil y fijar vista móvil -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>[LOGIN LÍDERES]</title>
    <style>
        /* Variables de Sistema del Alto Mando: Oro de Prestigio Moderno y Negro Sigilo */
        :root {
            --stealth-dark: #020407;
            --glass-core: rgba(10, 16, 26, 0.65); /* Cristal más translúcido y limpio */
            --gold-prestige: #dcae3b;
            --gold-glow: rgba(220, 174, 59, 0.18); /* Iluminación ambiental de fibra óptica */
            --laser-cyan: #00d9ff;
            --sub-slate: #56687a;
            --pure-light: #f1f5f9;
            --alert-red: #ff4a4a;
            --grid-line: rgba(220, 174, 59, 0.015);
        }

        /* INGENIERÍA DE PANTALLA COMPLETA VERTICAL ABSOLUTA EN MÓVILES (CERO LAG) */
        html, body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--stealth-dark);
        }

        body {
            color: var(--pure-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: none;
            position: relative;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px; /* Rejilla más fina y moderna */
            background-position: center;

            /* Bloqueo estricto de resaltado para comportamiento de App Nativa */
            -webkit-user-select: none;
            user-select: none;
        }

        /* FORZADO DE RENDERIZADO POR GPU PARA VELOCIDAD ESTRICTA DE 60 FPS */
        .mainframe-container, .form-input, .btn-submit, .radar-sweep, .radar-blip, .alert-box, .hud-v-bar-fill {
            -webkit-transform: translate3d(0, 0, 0);
            transform: translate3d(0, 0, 0);
            will-change: transform, opacity;
        }
        /* CAPA DEL RADAR MILITAR MODERNO EN ORO PRESTIGIO (60 FPS) */
        .radar-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        /* Chasis Circular del Sonar con Líneas Áureas de Alta Definición */
        .radar-screen {
            width: 92vw; height: 92vw;
            max-width: 440px; max-height: 440px;
            border-radius: 50%;
            border: 2px solid rgba(220, 174, 59, 0.25); /* Línea externa reforzada */
            box-shadow: 0 0 50px rgba(220, 174, 59, 0.08);
            position: relative;
            background: 
                radial-gradient(circle, transparent 30%, rgba(220, 174, 59, 0.06) 31%, transparent 32%, 
                                transparent 60%, rgba(220, 174, 59, 0.06) 61%, transparent 62%);
        }

        /* Ejes de Coordenadas Cruzadas Vectoriales */
        .radar-screen::before, .radar-screen::after {
            content: '';
            position: absolute;
            background-color: rgba(220, 174, 59, 0.15);
        }
        .radar-screen::before { top: 0; left: 50%; width: 1.5px; height: 100%; }
        .radar-screen::after { top: 50%; left: 0; width: 100%; height: 1.5px; }

        /* Haz de Luz Giratorio de 360 Grados de Fibra Óptica */
        .radar-sweep {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--gold-prestige) 0deg, rgba(220, 174, 59, 0.25) 12deg, transparent 60deg);
            animation: radar-spin 4s infinite linear;
            z-index: 3;
        }

        @keyframes radar-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* OBJETIVOS MILITARES (BLIPS TÁCTICOS CIAN ALTO CONTRASTE) */
        .radar-blip {
            position: absolute;
            width: 6px; height: 6px;
            background-color: #fff; /* Blanco núcleo para destellar en pantallas modernas */
            border-radius: 50%;
            box-shadow: 0 0 10px var(--laser-cyan), 0 0 20px var(--laser-cyan);
            z-index: 4;
            opacity: 0;
        }

        /* Animaciones asíncronas para simular escaneo en tiempo real */
        .target-alpha { top: 25%; left: 30%; animation: target-glow 4s infinite ease-in-out; }
        .target-bravo { top: 65%; left: 75%; animation: target-glow 4s infinite ease-in-out 1.2s; }
        .target-charlie { top: 15%; left: 68%; animation: target-glow 4s infinite ease-in-out 2.5s; }

        @keyframes target-glow {
            0%, 100% { opacity: 0; transform: scale3d(0.5, 0.5, 1); }
            40%, 60% { opacity: 0.9; transform: scale3d(1.1, 1.1, 1); }
        }
                /* CONSOLA CENTRAL CON BISELES ASIMÉTRICOS POLIGONALES (ESTILO STEALTH DE VANGUARDIA) */
        .mainframe-container {
            background: rgba(7, 13, 22, 0.55); /* Cristal de búnker moderno más translúcido */
            border: 1px solid rgba(220, 174, 59, 0.25);
            padding: 30px 24px;
            width: 96vw;          
            max-width: 440px;
            height: 94vh;         
            max-height: 94vh; 
            box-sizing: border-box;
            
            /* Sombra difusa holográfica estilo fibra óptica */
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9), 0 0 30px var(--gold-glow);
            
            /* CORTE POLIGONAL ASIMÉTRICO MODERNO DE QUINTA GENERACIÓN */
            clip-path: polygon(0% 0%, 92% 0%, 100% 8%, 100% 100%, 8% 100%, 0% 92%);
            
            position: relative;
            z-index: 5;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            justify-content: center; 
            gap: 14px;              
        }

        /* LÁSER PERIMETRAL DE AUTORIDAD A 60 FPS */
        .laser-border {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--gold-prestige), transparent);
            z-index: 6;
        }
        .lb-top { top: 0; left: -100%; width: 100%; height: 1px; animation: laser-h 4.5s infinite linear; }
        .lb-bottom { bottom: 0; right: -100%; width: 100%; height: 1px; animation: laser-h-rev 4.5s infinite linear; }

        @keyframes laser-h { 0% { transform: translate3d(-100%, 0, 0); } 100% { transform: translate3d(100%, 0, 0); } }
        @keyframes laser-h-rev { 0% { transform: translate3d(100%, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* Ángulos de Titanio para el Enfoque de Retícula */
        .corner-bracket {
            position: absolute;
            width: 14px; height: 14px;
            border: 2px solid rgba(220, 174, 59, 0.4);
            z-index: 7;
        }
        .tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        /* CABECERA PRIVADA SANITIZADA */
        .header-shield {
            text-align: center;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(220, 174, 59, 0.15);
            padding-bottom: 12px;
        }

        .sys-badge {
            font-size: 10px;
            font-family: monospace;
            color: var(--gold-prestige);
            letter-spacing: 3px;
            font-weight: bold;
        }

        h1 {
            font-size: 19px;
            font-weight: 800;
            margin: 6px 0 0 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--pure-light);
        }

        /* CAMPOS DEL FORMULARIO HUD MILITAR CON FUENTES MONO-ESTILIZADAS */
        .form-group {
            margin-bottom: 5px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 10px;
            font-family: monospace;
            color: var(--sub-slate);
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ELEMENTO SELECTOR Y CAMPO DE TEXTO SIN LAG BAJO ESTRESO */
        .form-input {
            width: 100%;
            padding: 16px;
            background: #020407; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            color: var(--pure-light);
            font-size: 13px;
            font-family: monospace;
            letter-spacing: 1px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.15s linear, box-shadow 0.15s linear;
            -webkit-appearance: none; 
            appearance: none;
        }

        select.form-input {
            cursor: pointer;
            background-image: linear-gradient(45deg, transparent 50%, var(--gold-prestige) 50%), linear-gradient(135deg, var(--gold-prestige) 50%, transparent 50%);
            background-position: calc(100% - 20px) calc(1em + 4px), calc(100% - 15px) calc(1em + 4px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
        }

        select.form-input option {
            background-color: #0c121b;
            color: var(--pure-light);
            padding: 10px;
        }

        .form-input:focus {
            border-color: var(--gold-prestige);
            box-shadow: 0 0 15px rgba(220, 174, 59, 0.15);
        }

        /* BOTÓN DE VALIDACIÓN MODERNO CON CORTE GEOMÉTRICO ASIMÉTRICO */
        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, rgba(220, 174, 59, 0.03), rgba(220, 174, 59, 0.08));
            border: 1px solid var(--gold-prestige);
            color: var(--gold-prestige);
            font-size: 12px;
            font-family: monospace;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            box-sizing: border-box;
            margin-top: 10px;
            -webkit-tap-highlight-color: transparent;
            
            /* Bisel moderno a juego con el chasis */
            clip-path: polygon(0% 0%, 94% 0%, 100% 25%, 100% 100%, 6% 100%, 0% 75%);
            transition: background-color 0.15s linear, color 0.15s linear;
        }

        .btn-submit:active {
            background: var(--gold-prestige);
            color: var(--stealth-dark);
            transform: scale3d(0.99, 0.99, 1);
        }

        .alert-box {
            display: none;
            margin-top: 5px;
            background: rgba(255, 74, 74, 0.04);
            border: 1px solid var(--alert-red);
            border-left: 3px solid var(--alert-red);
            color: var(--alert-red);
            font-size: 11px;
            font-family: monospace;
            padding: 12px;
            text-align: left;
            line-height: 1.4;
            animation: alert-appear 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes alert-appear {
            from { opacity: 0; transform: translate3d(0, 5px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        .btn-back {
            display: block;
            text-align: center;
            font-size: 10px;
            font-family: monospace;
            color: var(--sub-slate);
            text-decoration: none;
            margin-top: 5px;
            letter-spacing: 1px;
        }
        .btn-back:active { color: var(--laser-cyan); }

        /* MICRO-GRÁFICOS DE TELEMETRÍA Y COORDENADAS DIGITALES PERIMETRALES */
        .hud-frame-telemetry {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 3; 
            box-sizing: border-box;
            padding: 15px;
            font-family: monospace;
            font-size: 8px;
            color: rgba(220, 174, 59, 0.25); 
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-row { display: flex; justify-content: space-between; width: 100%; }

        .hud-bracket {
            position: absolute;
            width: 20px; height: 20px;
            border: 1px solid rgba(220, 174, 59, 0.12);
        }
        .h-tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .h-tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .h-bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .h-br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        .hud-crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate3d(-50%, -50%, 0);
            width: 30px; height: 30px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.15;
        }
        .hud-crosshair::before, .hud-crosshair::after { content: ''; position: absolute; background-color: var(--gold-prestige); }
        .hud-crosshair::before { top: 14px; left: 0; width: 100%; height: 1px; }
        .hud-crosshair::after { top: 0; left: 14px; width: 1px; height: 100%; }

        /* BARRAS VERTICALES DE CARGA SATELITAL (LLEVAN LOS LATERALES VACÍOS) */
        .hud-v-bar {
            position: absolute;
            top: 35vh; width: 3px; height: 30vh;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(220, 174, 59, 0.08);
            z-index: 3;
            pointer-events: none;
        }
        .bar-left { left: 15px; }
        .bar-right { right: 15px; }
        .hud-v-bar-fill {
            width: 100%; height: 65%; /* Nivel estático simulando actividad binaria */
            background: var(--gold-prestige);
            box-shadow: 0 0 8px var(--gold-prestige);
        }
    </style>
</head>
<body>

    <!-- CAPA DEL RADAR MILITAR MEJORADO EN ORO PRESTIGIO -->
    <div class="radar-container">
        <div class="radar-screen">
            <div class="radar-sweep"></div>
            <div class="radar-blip target-alpha"></div>
            <div class="radar-blip target-bravo"></div>
            <div class="radar-blip target-charlie"></div>
        </div>
    </div>

    <!-- MIRA DE CENTRADO TÁCTICO HUD -->
    <div class="hud-crosshair"></div>

    <!-- TELEMETRÍA Y MARCAS DIGITALES PERIMETRALES -->
    <div class="hud-bracket h-tl"></div>
    <div class="hud-bracket h-tr"></div>
    <div class="hud-bracket h-bl"></div>
    <div class="hud-bracket h-br"></div>
    
    <!-- BARRAS SATELITALES LATERALES CONTRA MARCOS VACÍOS -->
    <div class="hud-v-bar bar-left"><div class="hud-v-bar-fill"></div></div>
    <div class="hud-v-bar bar-right"><div class="hud-v-bar-fill" style="height: 40%;"></div></div>

    <div class="hud-frame-telemetry">
        <div class="hud-row">
            <span>SYS_LOC: MAINFRAME_BUNKER_01</span>
            <span>GRID_SEC: [22-06-26]</span>
        </div>
        <div class="hud-row">
            <span>ALT_MANDO // CALIBRATION_MODE</span>
            <span>SECURE_LINK // TRK_ACTV</span>
        </div>
    </div>

    <div class="mainframe-container">
        <!-- Haz de luz perimetral en oro -->
        <div class="laser-border lb-top"></div>
        <div class="laser-border lb-bottom"></div>

        <!-- Ángulos estructurales fijados -->
        <div class="corner-bracket tl"></div>
        <div class="corner-bracket tr"></div>
        <div class="corner-bracket bl"></div>
        <div class="corner-bracket br"></div>

        <!-- Cabecera de Alto Rango -->
        <div class="header-shield">
            <div class="sys-badge">✦ AUTENTICACIÓN OPERATIVA ✦</div>
            <h1>ALTO MANDO GENERAL DE MESA</h1>
        </div>

        <!-- Formulario Táctico con Menú de Selección Desplegable -->
        <form id="loginForm">
            <div class="form-group">
                <label for="user">SELECCIONAR FACCIÓN MILITAR</label>
                <select class="form-input" id="user" required>
                    <option value="" disabled selected>SELECCIONE SU DIVISIÓN</option>
                    <option value="lider_academia">Academia Militar</option>
                    <option value="lider_fuego">Comando Táctico Fuego</option>
                    <option value="lider_agua">Fuerzas Anfibias Agua</option>
                    <option value="lider_tierra">Infantería Blindada Tierra</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pass">LLAVE CRIPTOGRÁFICA DE ACCESO</label>
                <input type="password" class="form-input" id="pass" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit">VERIFICAR MANDATO</button>
        </form>

        <!-- Mensajes de Alerta Crítica -->
        <div id="errorMessage" class="alert-box"></div>

        <a href="/" class="btn-back">← ABORTAR OPERACIÓN / VOLVER AL INICIO</a>
    </div>
        <!-- CONTROLADOR JAVASCRIPT Y MOTOR DE AUDIO DEL ALTO MANDO -->
    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Tono: Enlace exitoso (Pulso doble de alta frecuencia)
        function playSuccessSound() {
            initAudio();
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(1500, audioCtx.currentTime);
            gain1.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.04);

            setTimeout(() => {
                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(1900, audioCtx.currentTime);
                gain2.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.04);
            }, 40);
        }

        // Tono: Acceso Denegado (Pulso descendente de advertencia)
        function playFailureSound() {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(700, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(250, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // Escucha táctil para habilitar el motor de audio en teléfonos móviles
        document.body.addEventListener('touchstart', initAudio, {passive: true});

        // Envío seguro de credenciales al servidor de Express
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            initAudio();

            const userVal = document.getElementById('user').value;
            // El uso de .trim() purga espacios invisibles accidentales al escribir la clave
            const passVal = document.getElementById('pass').value.trim();
            const errorDiv = document.getElementById('errorMessage');

            errorDiv.style.opacity = "0";
            errorDiv.style.display = "none";
            errorDiv.innerText = "";

            fetch('/api/login-lideres', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user: userVal, pass: passVal })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    playSuccessSound();
                    // Breve retraso para oír el tono de éxito antes de la redirección
                    setTimeout(() => { window.location.href = data.redirect; }, 120);
                } else {
                    playFailureSound();
                    errorDiv.innerText = `⚠️ [DENEGADO]: ${data.message}`;
                    errorDiv.style.display = "block";
                }
            })
            .catch(() => {
                playFailureSound();
                errorDiv.innerText = "🚨 [FALLA DE ENLACE]: Mainframe central inaccesible.";
                errorDiv.style.display = "block";
            });
        });
    </script>
</body>
</html>
