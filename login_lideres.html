<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Forzado de escala estricto para evitar zoom táctil y fijar vista móvil tipo App nativa vertical -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>[LOGIN LÍDERES]</title>
    <style>
        /* Variables de Sistema del Alto Mando: Oro de Prestigio y Negro Sigilo */
        :root {
            --stealth-dark: #020407;
            --glass-core: rgba(14, 21, 31, 0.85);
            --gold-prestige: #dcae3b;
            --gold-glow: rgba(220, 174, 59, 0.25);
            --laser-cyan: #00d9ff;
            --sub-slate: #56687a;
            --pure-light: #f1f5f9;
            --alert-red: #ff4a4a;
            --grid-line: rgba(220, 174, 59, 0.015);
        }

        /* INGENIERÍA DE PANTALLA COMPLETA VERTICAL ABSOLUTA EN MÓVILES (CERO LAG) */
        html, body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--stealth-dark);
        }

        body {
            color: var(--pure-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: none;
            position: relative;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;

            /* Bloqueo estricto de resaltado para simular comportamiento de App Nativa */
            -webkit-user-select: none;
            user-select: none;
        }

        /* FORZADO DE RENDERIZADO POR GPU */
        .mainframe-container, .form-input, .btn-submit, .wave {
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            will-change: transform, opacity;
        }

        /* FONDO ANIMADO: Radar cuántico en tono áureo */
        .radar-wave-hub {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            border: 1px solid rgba(220, 174, 59, 0.04);
            border-radius: 50%;
            animation: node-pulse 8s infinite cubic-bezier(0.1, 0.8, 0.3, 1);
            opacity: 0;
        }
        .w1 { width: 80vw; height: 80vw; max-width: 320px; max-height: 320px; animation-delay: 0s; }
        .w2 { width: 80vw; height: 80vw; max-width: 320px; max-height: 320px; animation-delay: 3s; }

        @keyframes node-pulse {
            0% { transform: scale(0.6); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: scale(3.5); opacity: 0; border-color: rgba(220, 174, 59, 0.01); }
        }
        /* CONSOLA CENTRAL DE AUTENTICACIÓN RESTRINGIDA */
        .mainframe-container {
            background: var(--glass-core);
            border: 1px solid rgba(220, 174, 59, 0.25);
            padding: 35px 24px;
            width: 88vw;
            max-width: 400px;
            max-height: 85vh; 
            box-sizing: border-box;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.85);
            position: relative;
            z-index: 5;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* LÁSER PERIMETRAL DE AUTORIDAD */
        .laser-border {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--gold-prestige), transparent);
            z-index: 6;
        }
        .lb-top { top: 0; left: -100%; width: 100%; height: 1px; animation: laser-h 4.5s infinite linear; }
        .lb-bottom { bottom: 0; right: -100%; width: 100%; height: 1px; animation: laser-h-rev 4.5s infinite linear; }
        
        @keyframes laser-h { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes laser-h-rev { 0% { right: -100%; } 100% { right: 100%; } }

        /* Biseles de Esquina de Oro Militar */
        .corner-bracket {
            position: absolute;
            width: 14px; height: 14px;
            border: 2px solid rgba(220, 174, 59, 0.4);
            z-index: 7;
        }
        .tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        /* CABECERA PRIVADA */
        .header-shield {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(220, 174, 59, 0.15);
            padding-bottom: 12px;
        }

        .sys-badge {
            font-size: 10px;
            font-family: monospace;
            color: var(--gold-prestige);
            letter-spacing: 3px;
            font-weight: bold;
        }

        h1 {
            font-size: 19px;
            font-weight: 800;
            margin: 6px 0 0 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--pure-light);
        }

        /* CAMPOS DEL FORMULARIO HUD MILITAR */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 10px;
            font-family: monospace;
            color: var(--sub-slate);
            margin-bottom: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* ELEMENTO SELECTOR Y CAMPO DE TEXTO SIN LAG */
        .form-input {
            width: 100%;
            padding: 16px;
            background: #020407; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            color: var(--pure-light);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.15s linear, box-shadow 0.15s linear;
            -webkit-appearance: none; /* Elimina estilos nativos feos en iOS/Android */
            appearance: none;
        }

        /* Variante específica para el menú desplegable (añade flecha táctica discreta) */
        select.form-input {
            cursor: pointer;
            background-image: linear-gradient(45deg, transparent 50%, var(--gold-prestige) 50%), linear-gradient(135deg, var(--gold-prestige) 50%, transparent 50%);
            background-position: calc(100% - 20px) calc(1em + 4px), calc(100% - 15px) calc(1em + 4px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
        }

        /* Estilos de las opciones internas del desplegable */
        select.form-input option {
            background-color: #0c121b;
            color: var(--pure-light);
            padding: 10px;
        }

        .form-input:focus {
            border-color: var(--gold-prestige);
            box-shadow: 0 0 15px rgba(220, 174, 59, 0.15);
        }

        /* BOTÓN DE VALIDACIÓN ACCELERADO POR GPU */
        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, rgba(220, 174, 59, 0.03), rgba(220, 174, 59, 0.08));
            border: 1px solid var(--gold-prestige);
            color: var(--gold-prestige);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            box-sizing: border-box;
            border-radius: 3px;
            transition: background-color 0.15s linear, color 0.15s linear;
            -webkit-tap-highlight-color: transparent;
            margin-top: 20px;
        }

        .btn-submit:active {
            background: var(--gold-prestige);
            color: var(--stealth-dark);
        }

        /* CUADRO DE NOTIFICACIÓN DE ERROR */
        .alert-box {
            display: none;
            margin-top: 15px;
            background: rgba(255, 74, 74, 0.04);
            border: 1px solid var(--alert-red);
            border-left: 3px solid var(--alert-red);
            color: var(--alert-red);
            font-size: 11px;
            font-family: monospace;
            padding: 12px;
            text-align: left;
            line-height: 1.4;
        }

        .btn-back {
            display: block;
            text-align: center;
            font-size: 10px;
            font-family: monospace;
            color: var(--sub-slate);
            text-decoration: none;
            margin-top: 18px;
            letter-spacing: 1px;
        }
        .btn-back:active { color: var(--laser-cyan); }
    </style>
</head>
<body>

    <!-- Capas animadas del búnker del Alto Mando -->
    <div class="radar-wave-hub">
        <div class="wave w1"></div>
        <div class="wave w2"></div>
    </div>

    <div class="mainframe-container">
        <!-- Haz de luz perimetral en oro -->
        <div class="laser-border lb-top"></div>
        <div class="laser-border lb-bottom"></div>

        <!-- Ángulos estructurales fijados -->
        <div class="corner-bracket tl"></div>
        <div class="corner-bracket tr"></div>
        <div class="corner-bracket bl"></div>
        <div class="corner-bracket br"></div>

        <!-- Cabecera de Alto Rango -->
        <div class="header-shield">
            <div class="sys-badge">✦ AUTENTICACIÓN OFICIAL ✦</div>
            <h1>ALTO MANDO GEBERAL DE MESA</h1>
        </div>

        <!-- Formulario Táctico con Menú de Selección Desplegable -->
        <form id="loginForm">
            <div class="form-group">
                <label for="user">SELECCIONAR FACCIÓN MILITAR</label>
                <select class="form-input" id="user" required>
                    <option value="" disabled selected>SELECCIONE SU DIVISIÓN</option>

                    <option value="lider_academia">Academia Militar</option>
                    <option value="lider_fuego">Comando Táctico Fuego</option>
                    <option value="lider_agua">Fuerzas Anfibias Agua</option>
                    <option value="lider_tierra">Infantería Blindada Tierra</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pass">LLAVE CRIPTOGRÁFICA DE ACCESO</label>
                <input type="password" class="form-input" id="pass" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit">VERIFICAR MANDATO</button>
        </form>

        <!-- Mensajes de Alerta Crítica -->
        <div id="errorMessage" class="alert-box"></div>

        <a href="/" class="btn-back">← ABORTAR OPERACIÓN / VOLVER AL INICIO</a>
    </div>

    <!-- CONTROLADOR JAVASCRIPT Y MOTOR DE AUDIO DEL ALTO MANDO -->
    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Tono: Enlace exitoso (Pulso doble de alta frecuencia)
        function playSuccessSound() {
            initAudio();
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(1500, audioCtx.currentTime);
            gain1.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.04);

            setTimeout(() => {
                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(1900, audioCtx.currentTime);
                gain2.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.04);
            }, 40);
        }

        // Tono: Acceso Denegado (Pulso descendente de advertencia)
        function playFailureSound() {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(700, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(250, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // Escucha táctil para habilitar el motor de audio en teléfonos móviles
        document.body.addEventListener('touchstart', initAudio, {passive: true});

        // Envío seguro de credenciales al servidor de Express
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            initAudio();

            const userVal = document.getElementById('user').value;
            const passVal = document.getElementById('pass').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = "none";
            errorDiv.innerText = "";

            fetch('/api/login-lideres', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user: userVal, pass: passVal })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    playSuccessSound();
                    // Breve retraso para oír el tono de éxito antes de la redirección
                    setTimeout(() => { window.location.href = data.redirect; }, 120);
                } else {
                    playFailureSound();
                    errorDiv.innerText = `⚠️ [DENEGADO]: ${data.message}`;
                    errorDiv.style.display = "block";
                }
            })
            .catch(() => {
                playFailureSound();
                errorDiv.innerText = "🚨 [FALLA DE ENLACE]: Mainframe central inaccesible.";
                errorDiv.style.display = "block";
            });
        });
    </script>
</body>
</html>
