<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Forzado de escala estricto para evitar zoom táctil y fijar vista móvil tipo App nativa -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>[ COBRA CYBERNETIC MANAGEMENT ]</title>
    <style>
        /* Variables de Sistema de Nueva Generación */
        :root {
            --stealth-dark: #020407;
            --glass-core: rgba(7, 13, 22, 0.75);
            --laser-cyan: #00d9ff;
            --gold-prestige: #dcae3b;
            --gold-glow: rgba(220, 174, 59, 0.25);
            --sub-slate: #56687a;
            --pure-light: #f1f5f9;
            --grid-line: rgba(0, 217, 255, 0.015);
        }

        /* INGENIERÍA DE PANTALLA COMPLETA VERTICAL ABSOLUTA */
        html, body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Corta desplazamientos fuera de foco */
            background-color: var(--stealth-dark);
        }

        body {
            color: var(--pure-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Bloquea el scroll elástico de iOS y rebotes de Android */
            position: relative;
            
            /* Blindaje total contra resaltado de textos al presionar la pantalla */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* FONDO ANIMADO 1: Cuadrícula con pulso de escaneo de satélite */
        .dynamic-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            z-index: 1;
        }

        /* FONDO ANIMADO 2: Círculos concéntricos con pulso suave de radar */
        .radar-wave-hub {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            border: 1px solid rgba(0, 217, 255, 0.05);
            border-radius: 50%;
            animation: node-pulse 8s infinite cubic-bezier(0.1, 0.8, 0.3, 1);
            opacity: 0;
        }
        .w1 { width: 80vw; height: 80vw; max-width: 320px; max-height: 320px; animation-delay: 0s; }
        .w2 { width: 80vw; height: 80vw; max-width: 320px; max-height: 320px; animation-delay: 2.5s; }
        .w3 { width: 80vw; height: 80vw; max-width: 320px; max-height: 320px; animation-delay: 5s; }

        @keyframes node-pulse {
            0% { transform: scale(0.6); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: scale(3.5); opacity: 0; border-color: rgba(0, 217, 255, 0.01); }
        }
        /* CONSOLA CENTRAL BLINDADA EN DISEÑO VERTICAL FLUIDO */
        .mainframe-container {
            background: var(--glass-core);
            border: 1px solid rgba(0, 217, 255, 0.12);
            padding: 30px 22px;
            width: 88vw;
            max-width: 400px;
            max-height: 85vh; /* Previene desbordes en terminales compactas */
            box-sizing: border-box;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 5;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* CORREDOR LÁSER PERIMETRAL ANIMADO */
        .laser-border {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--laser-cyan), transparent);
            z-index: 6;
        }
        .lb-top { top: 0; left: -100%; width: 100%; height: 1px; animation: laser-h 4s infinite linear; }
        .lb-bottom { bottom: 0; right: -100%; width: 100%; height: 1px; animation: laser-h-rev 4s infinite linear; }
        
        @keyframes laser-h { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes laser-h-rev { 0% { right: -100%; } 100% { right: 100%; } }

        /* Esquinas Fijas con Ángulos de Titanio */
        .corner-bracket {
            position: absolute;
            width: 14px; height: 14px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            z-index: 7;
        }
        .tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        /* CABECERA CON MÉTRICAS EN MOVIMIENTO */
        .header-shield {
            text-align: left;
            margin-bottom: 20px;
            position: relative;
        }

        .live-data-stream {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            font-family: monospace;
            color: var(--sub-slate);
            letter-spacing: 1.5px;
        }

        .live-node::after {
            content: '●';
            color: var(--laser-cyan);
            margin-left: 5px;
            animation: soft-blink 2s infinite steps(2, start);
        }
        @keyframes soft-blink { to { opacity: 0.2; } }

        h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 6px 0 0 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 60%, var(--sub-slate));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* SECCIÓN ALTO MANDO: Máximo Rango Superior */
        .supreme-command-zone {
            margin-bottom: 20px;
        }

        .btn-lider {
            display: block;
            padding: 16px;
            background: linear-gradient(135deg, rgba(220, 174, 59, 0.02), rgba(220, 174, 59, 0.06));
            border: 1px solid var(--gold-prestige);
            border-radius: 3px;
            color: var(--gold-prestige);
            text-decoration: none;
            position: relative;
            box-shadow: 0 4px 25px rgba(220, 174, 59, 0.03);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-lider::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border: 1px solid var(--gold-prestige);
            border-radius: 3px;
            opacity: 0.3;
            animation: gold-pulse-border 3s infinite ease-in-out;
        }
        @keyframes gold-pulse-border {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.02); opacity: 0; }
        }

        .rank-title {
            display: block;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 4px;
            text-align: center;
        }

        .rank-subtitle {
            display: block;
            font-size: 9px;
            color: rgba(220, 174, 59, 0.6);
            letter-spacing: 1.5px;
            font-family: monospace;
            text-align: center;
            margin-top: 4px;
        }

        .btn-lider:active {
            background: rgba(220, 174, 59, 0.12);
            box-shadow: 0 0 25px rgba(220, 174, 59, 0.25);
            transform: scale(0.99);
        }

        /* DIVISOR TÁCTICO CON BARRA DE PROGRESO DE RED */
        .rank-divider {
            font-size: 9px;
            font-family: monospace;
            color: var(--sub-slate);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bar-loader-static {
            height: 2px;
            width: 60px;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }
        .bar-loader-static::after {
            content: '';
            position: absolute;
            left: -100%; top: 0; width: 100%; height: 100%;
            background: var(--laser-cyan);
            animation: fluid-load 3s infinite linear;
        }
        @keyframes fluid-load { 0% { left: -100%; } 100% { left: 100%; } }

        /* BOTONES DE LAS DIVISIONES DE INFANTERÍA ACCESIBLES */
        .btn-faction {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.01);
            color: var(--pure-light);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            box-sizing: border-box;
            border-radius: 3px;
            position: relative;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-faction::before {
            content: '';
            position: absolute;
            left: 0; top: 15%; bottom: 15%;
            width: 2px;
            background-color: var(--laser-cyan);
            transform: scaleY(0);
            transition: transform 0.15s ease;
        }

        .btn-faction .arrow {
            color: var(--sub-slate);
            font-family: monospace;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .btn-faction:active {
            background: rgba(0, 217, 255, 0.04);
            border-color: rgba(0, 217, 255, 0.3);
            color: var(--laser-cyan);
            padding-left: 24px;
        }
        .btn-faction:active::before {
            transform: scaleY(1);
        }
        .btn-faction:active .arrow {
            transform: translateX(3px);
            color: var(--laser-cyan);
        }

        /* PANEL INFERIOR DE RED CON MARCADOR FLUIDO */
        .status-footer {
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            font-family: monospace;
            color: var(--sub-slate);
            letter-spacing: 0.5px;
        }

        .terminal-stream {
            animation: text-pulse-data 4s infinite alternate;
        }
        @keyframes text-pulse-data { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Capas animadas del búnker en vertical absoluta -->
    <div class="dynamic-bg"></div>
    <div class="radar-wave-hub">
        <div class="wave w1"></div>
        <div class="wave w2"></div>
        <div class="wave w3"></div>
    </div>

    <div class="mainframe-container">
        <!-- Haz de luz perimetral -->
        <div class="laser-border lb-top"></div>
        <div class="laser-border lb-bottom"></div>

        <!-- Ángulos estructurales fijados -->
        <div class="corner-bracket tl"></div>
        <div class="corner-bracket tr"></div>
        <div class="corner-bracket bl"></div>
        <div class="corner-bracket br"></div>

        <!-- Cabecera Operativa Personalizada -->
        <div class="header-shield">
            <div class="live-data-stream">
                <span>SYSTEM ID // DATA CENTER-MESA</span>
                <span class="live-node">CON_SECURE</span>
            </div>
            <h1>CENTRAL MILITAR DE MESA (C.M.M.)</h1>
        </div>
        
        <!-- SECCIÓN ALTO MANDO: Máxima jerarquía y respeto -->
        <div class="supreme-command-zone">
            <a class="btn-lider" id="btnLiderCommand" href="/altomando/login">
                <span class="rank-title">✦ ALTO MANDO ✦</span>
                <span class="rank-subtitle">[ACCESO SOLO PERSONAL AUTORIZADO]</span>
            </a>
        </div>

        <!-- Separador Dinámico -->
        <div class="rank-divider">
            <div class="bar-loader-static"></div>
            <span>DIVISIONES ESPECIALES</span>
            <div class="bar-loader-static"></div>
        </div>

        <!-- Accesos de Destacamento -->
        <div style="display: flex; flex-direction: column;">
            <a class="btn-faction btn-ops" href="/fuego/login">
                <span>Comando Táctico Fuego</span>
                <span class="arrow">→</span>
            </a>
            <a class="btn-faction btn-ops" href="/agua/login">
                <span>Fuerzas Anfibias Agua</span>
                <span class="arrow">→</span>
            </a>
            <a class="btn-faction btn-ops" href="/tierra/login">
                <span>Infantería Blindada Tierra</span>
                <span class="arrow">→</span>
            </a>
        </div>

        <!-- Pie de Monitoreo de Datos -->
        <div class="status-footer">
            <span class="terminal-stream">RADAR: ACTIVE</span>
            <span>SHIELD_v4.2</span>
        </div>
    </div>

    <!-- INGENIERÍA DE AUDIO SINTÉTICO MILITAR FURTIVO CON RADAR CONTINUO -->
    <script>
        let audioCtx = null;
        let radarInterval = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            // Inicializador del radar de fondo automático en el primer toque táctil
            if (!radarInterval) {
                playRadarPing(); 
                radarInterval = setInterval(playRadarPing, 4000); // Bucle infinito cada 4 segundos
            }
        }

        // Radar Militar Avanzado: Onda subgrave pura amortiguada (Textura sónica)
        function playRadarPing() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140, audioCtx.currentTime); // Frecuencia subgrave profunda
                osc.frequency.exponentialRampToValueAtTime(70, audioCtx.currentTime + 1.6);
                
                // Volumen extremadamente bajo para simular un ambiente táctico silencioso
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.8);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 1.8);
            } catch (err) {
                console.log("Falla de audio de hardware");
            }
        }

        // Clic de Reclutas: Pulso metálico seco de decaimiento logarítmico rápido
        function playOpsClick(e) {
            initAudio();
            e.preventDefault();
            const targetUrl = this.getAttribute('href');

            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1400, audioCtx.currentTime); // Pulso seco estilo sonar activo

            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);

            // Redirección con retraso corto para procesar el clic físico
            setTimeout(() => { window.location.href = targetUrl; }, 50);
        }

        // Clic de Alto Mando: Frecuencias entrelazadas de doble respuesta instantánea
        function playLiderClick(e) {
            initAudio();
            e.preventDefault();
            const targetUrl = this.getAttribute('href');

            // Canal 1 - Tono Base Compuesto
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(1600, audioCtx.currentTime);
            gain1.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.03);

            // Canal 2 - Tono Armónico Secundario (Retrasado 35ms)
            setTimeout(() => {
                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(2100, audioCtx.currentTime); // Frecuencia de éxito autorizada
                gain2.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.03);
            }, 35);

            setTimeout(() => { window.location.href = targetUrl; }, 100);
        }

        // Eventos táctiles obligatorios para navegadores móviles
        document.body.addEventListener('touchstart', initAudio, {passive: true});
        document.body.addEventListener('click', initAudio);

        // Enlace de triggers
        document.querySelectorAll('.btn-ops').forEach(btn => {
            btn.addEventListener('click', playOpsClick);
        });
        document.getElementById('btnLiderCommand').addEventListener('click', playLiderClick);
    </script>
</body>
</html>
