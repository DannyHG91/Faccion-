<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santuario de Facciones</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #121214; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { margin-bottom: 30px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .grid { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; }
        .faction-card { background: #1f1f23; border: 2px solid #2f2f35; border-radius: 12px; padding: 40px 25px; width: 220px; text-align: center; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        /* Efectos visuales de poder para cada tarjeta */
        .fuego:hover { border-color: #ff4d4d; box-shadow: 0 0 20px rgba(255,77,77,0.4); transform: translateY(-5px); }
        .agua:hover { border-color: #3399ff; box-shadow: 0 0 20px rgba(51,153,255,0.4); transform: translateY(-5px); }
        .tierra:hover { border-color: #996633; box-shadow: 0 0 20px rgba(153,102,51,0.4); transform: translateY(-5px); }
        h2 { margin: 15px 0 10px 0; }
        p { color: #aaa; font-size: 14px; margin: 0;}
    </style>
</head>
<body>

    <h1>Selecciona tu Facción</h1>
    <div class="grid">
        <div class="faction-card fuego" onclick="irALogin('Fuego')">
            <div style="font-size: 50px;">🔥</div>
            <h2>Fuego</h2>
            <p>Ingresar al volcán</p>
        </div>
        <div class="faction-card agua" onclick="irALogin('Agua')">
            <div style="font-size: 50px;">💧</div>
            <h2>Agua</h2>
            <p>Ingresar al océano</p>
        </div>
        <div class="faction-card tierra" onclick="irALogin('Tierra')">
            <div style="font-size: 50px;">🪨</div>
            <h2>Tierra</h2>
            <p>Ingresar a la fortaleza</p>
        </div>
    </div>

    <script {nonce}>
        function irALogin(nombreFaction) {
            // Te envía dinámicamente a la ruta de logueo de esa facción
            window.location.href = `/${nombreFaction.toLowerCase()}/login`;
        }
    </script>
</body>
</html>
