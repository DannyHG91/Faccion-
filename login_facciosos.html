<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pase de Facción</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121214; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1f1f23; padding: 40px 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 340px; text-align: center; border-top: 5px solid #fff; }
        input, button { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #333; border-radius: 6px; box-sizing: border-box; background: #2a2a30; color: white; text-align: center; font-size: 16px; font-family: monospace; }
        input:focus { border-color: #007bff; outline: none; }
        button { background: #007bff; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        .btn-volver { background: transparent; border: 1px solid #444; color: #aaa; font-size: 14px; margin-top: 5px; font-family: Arial; }
    </style>
</head>
<body>

    <div class="card" id="loginCard">
        <div id="emblema" style="font-size: 45px;">🔮</div>
        <h2 id="titulo">Portal de Acceso</h2>
        <p style="color: #888; font-size: 13px;">Introduce tu Token de acceso asignado</p>
        
        <!-- CORRECCIÓN: Un solo campo de texto para el código de pase -->
        <input type="text" id="accessToken" placeholder="XXXX-XXXX-XXXX" autocomplete="off">
        <button onclick="validarToken()">Validar Pase</button>
        <button onclick="window.location.href='/'" class="btn-volver">Volver al Menú</button>
    </div>

    <script {nonce}>
        const urlPartes = window.location.pathname.split('/');
        const faccionActual = urlPartes[1].toLowerCase();

        const card = document.getElementById("loginCard");
        const emblema = document.getElementById("emblema");
        const titulo = document.getElementById("titulo");

        if (faccionActual === 'fuego') { card.style.borderTopColor = '#ff4d4d'; emblema.innerText = '🔥'; titulo.innerText = 'Acceso Fuego'; } 
        else if (faccionActual === 'agua') { card.style.borderTopColor = '#3399ff'; emblema.innerText = '💧'; titulo.innerText = 'Acceso Agua'; } 
        else if (faccionActual === 'tierra') { card.style.borderTopColor = '#996633'; emblema.innerText = '🪨'; titulo.innerText = 'Acceso Tierra'; }

        async function validarToken() {
            const token = document.getElementById("accessToken").value.trim();

            const response = await fetch('/api/login-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, factionUrl: faccionActual })
            });

            const resultado = await response.json();

            if (resultado.success) {
                window.location.href = resultado.redirect;
            } else {
                alert(resultado.message);
            }
        }
    </script>
</body>
</html>
