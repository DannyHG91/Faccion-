<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Forzado de escala estricto para evitar zoom táctil y fijar vista móvil -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>[ COBRA SECURITY GATEWAY - RECRUIT VERIFICATION ]</title>

    <style>
        /* Variables de Sistema de Nueva Generación */
        :root {
            --stealth-dark: #020407;
            --glass-core: rgba(7, 13, 22, 0.72);
            --laser-cyan: #00d9ff;
            --gold-prestige: #dcae3b;
            --sub-slate: #56687a;
            --pure-light: #f1f5f9;
            --alert-red: #ff4a4a;
            --grid-line: rgba(0, 217, 255, 0.015);
        }

        html, body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Corta desplazamientos fuera de foco */
            background-color: var(--stealth-dark);
        }

        body {
            background-color: var(--stealth-dark);
            color: var(--pure-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Bloquea el scroll elástico de iOS y rebotes de Android */
            position: relative;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            
            /* Blindaje total contra resaltar textos al presionar la pantalla */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* DIRECTIVA DE REDISTRIBUCIÓN GPU PARA RENDIMIENTO MÁXIMO DE 60 FPS */
        .mainframe-container, .laser-border, .radar-sweep, .radar-blip, .alert-box {
            -webkit-transform: translate3d(0,0,0);
            transform: translate3d(0,0,0);
            will-change: transform, opacity;
        }
        /* CAPA DEL RADAR MILITAR EN AZUL CIAN (60 FPS) */
        .radar-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        /* Chasis Circular del Sonar Sincronizado en Cian */
        .radar-screen {
            width: 92vw; height: 92vw;
            max-width: 440px; max-height: 440px;
            border-radius: 50%;
            border: 2px solid rgba(0, 217, 255, 0.25); /* Sincronizado con --laser-cyan */
            box-shadow: 0 0 50px rgba(0, 217, 255, 0.08);
            position: relative;
            background: 
                radial-gradient(circle, transparent 30%, rgba(0, 217, 255, 0.06) 31%, transparent 32%, 
                                transparent 60%, rgba(0, 217, 255, 0.06) 61%, transparent 62%);
        }

        /* Ejes de Coordenadas Cruzadas en Azul Láser */
        .radar-screen::before, .radar-screen::after {
            content: '';
            position: absolute;
            background-color: rgba(0, 217, 255, 0.15); /* Sincronizado con --laser-cyan */
        }
        .radar-screen::before { top: 0; left: 50%; width: 1.5px; height: 100%; }
        .radar-screen::after { top: 50%; left: 0; width: 100%; height: 1.5px; }

        /* Haz de Luz Giratorio de 360 Grados en degradado Cian */
        .radar-sweep {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--laser-cyan) 0deg, rgba(0, 217, 255, 0.25) 12deg, transparent 60deg);
            animation: radar-spin 4s infinite linear;
            z-index: 3;
        }

        @keyframes radar-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* OBJETIVOS EN MOVIMIENTO (BLIPS TÁCTICOS CIAN ALTO CONTRASTE) */
        .radar-blip {
            position: absolute;
            width: 6px; height: 6px;
            background-color: #fff; /* Blanco núcleo para destellar en el fondo azul */
            border-radius: 50%;
            box-shadow: 0 0 10px var(--laser-cyan), 0 0 20px var(--laser-cyan);
            z-index: 4;
            opacity: 0;
        }

        /* Animaciones asíncronas para simular escaneo en tiempo real */
        .target-alpha { top: 25%; left: 30%; animation: target-glow 4s infinite ease-in-out; }
        .target-bravo { top: 65%; left: 75%; animation: target-glow 4s infinite ease-in-out 1.2s; }
        .target-charlie { top: 15%; left: 68%; animation: target-glow 4s infinite ease-in-out 2.5s; }

        @keyframes target-glow {
            0%, 100% { opacity: 0; transform: scale3d(0.5, 0.5, 1); }
            40%, 60% { opacity: 0.9; transform: scale3d(1.1, 1.1, 1); }
        }
                /* CONSOLA CENTRAL DE VERIFICACIÓN (INTERFAZ GIGANTE) */
        .mainframe-container {
            background: rgba(7, 13, 22, 0.65); /* Opacidad de cristal para revelar el radar de fondo */
            border: 1px solid rgba(0, 217, 255, 0.12);
            padding: 30px 20px;
            width: 96vw;          /* Ajustado al 96% del ancho del navegador */
            max-width: 460px;
            height: 94vh;         /* Estirado al 94% del alto vertical útil */
            max-height: 94vh;
            box-sizing: border-box;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 5;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* CORREDOR LÁSER PERIMETRAL ANIMADO A 60 FPS */
        .laser-border {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--laser-cyan), transparent);
            z-index: 6;
        }
        .lb-top { top: 0; left: -100%; width: 100%; height: 1px; animation: laser-h 4s infinite linear; }
        .lb-bottom { bottom: 0; right: -100%; width: 100%; height: 1px; animation: laser-h-rev 4s infinite linear; }

        @keyframes laser-h { 0% { transform: translate3d(-100%, 0, 0); } 100% { transform: translate3d(100%, 0, 0); } }
        @keyframes laser-h-rev { 0% { transform: translate3d(100%, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* Esquinas de Titanio */
        .corner-bracket {
            position: absolute;
            width: 14px; height: 14px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            z-index: 7;
        }
        .tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        /* CABECERA OPERATIVA */
        .header-shield {
            text-align: left;
            margin-bottom: 20px;
        }

        .live-data-stream {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            font-family: monospace;
            color: var(--sub-slate);
            letter-spacing: 1.5px;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            margin: 8px 0 0 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--pure-light);
        }

        .faction-badge {
            display: inline-block;
            margin-top: 5px;
            font-size: 11px;
            font-family: monospace;
            color: var(--laser-cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* CAMPO DE ENTRADA (INPUT) DEL TOKEN */
        .token-group {
            margin: 15px 0;
            text-align: left;
        }

        .token-group label {
            display: block;
            font-size: 10px;
            font-family: monospace;
            color: var(--sub-slate);
            margin-bottom: 8px;
            letter-spacing: 1.5px;
        }

        .token-input {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            color: var(--pure-light);
            font-size: 15px;
            font-family: monospace;
            letter-spacing: 2px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .token-input:focus {
            border-color: var(--laser-cyan);
            background: rgba(0, 217, 255, 0.02);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.15);
        }

        /* BOTÓN DE AUTORIZACIÓN CRIPTOGRÁFICA */
        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.01);
            color: var(--pure-light);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            box-sizing: border-box;
            border-radius: 3px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-submit:active {
            background: rgba(0, 217, 255, 0.08);
            border-color: var(--laser-cyan);
            color: var(--laser-cyan);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
            transform: scale3d(0.99, 0.99, 1);
        }

        /* CUADRO DE NOTIFICACIÓN DE ERROR (60 FPS) */
        .alert-box {
            display: none;
            margin-top: 15px;
            background: rgba(255, 74, 74, 0.04);
            border: 1px solid var(--alert-red);
            border-left: 3px solid var(--alert-red);
            color: var(--alert-red);
            font-size: 11px;
            font-family: monospace;
            padding: 12px;
            text-align: left;
            line-height: 1.4;
            animation: pane-appear 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes pane-appear {
            from { opacity: 0; transform: translate3d(0, 5px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        .btn-back {
            display: block;
            text-align: center;
            font-size: 10px;
            font-family: monospace;
            color: var(--sub-slate);
            text-decoration: none;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        .btn-back:active { color: var(--laser-cyan); }
    </style>
</head>
<body>

    <!-- CAPA DEL RADAR MILITAR DE AVIACIÓN SINCRONIZADO EN AZUL CIAN -->
    <div class="radar-container">
        <div class="radar-screen">
            <div class="radar-sweep"></div>
            <div class="radar-blip target-alpha"></div>
            <div class="radar-blip target-bravo"></div>
            <div class="radar-blip target-charlie"></div>
        </div>
    </div>

    <!-- Capa de cuadrícula de fondo satelital -->
    <div class="dynamic-bg"></div>

    <div class="mainframe-container">
        <!-- Haz de luz perimetral -->
        <div class="laser-border lb-top"></div>
        <div class="laser-border lb-bottom"></div>

        <!-- Ángulos estructurales -->
        <div class="corner-bracket tl"></div>
        <div class="corner-bracket tr"></div>
        <div class="corner-bracket bl"></div>
        <div class="corner-bracket br"></div>

        <!-- Cabecera Operativa -->
        <div class="header-shield">
            <div class="live-data-stream">
                <span>GATEWAY // SECURE_AUTH</span>
                <span>STATUS: WAITING</span>
            </div>
            <h1>VERIFICACIÓN DE RECLUTA</h1>
            <div class="faction-badge" id="factionDisplay">DIVISIÓN: DETECTANDO...</div>
        </div>

        <!-- Formulario Táctico de Acceso -->
        <form id="tokenForm">
            <div class="token-group">
                <label for="tokenInput">INGRESE EL TOKEN ASIGNADO POR EL LÍDER</label>
                <input type="text" class="token-input" id="tokenInput" placeholder="EJ: FUEGO-XXXX-XXXX" autocomplete="off" required>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">VALIDAR CÓDIGO</button>
        </form>

        <!-- Mensajes de Error de Mainframe Militar -->
        <div id="errorMessage" class="alert-box"></div>

        <a href="/" class="btn-back">← ABORTAR VERIFICACIÓN / VOLVER AL PANEL</a>
    </div>
        <!-- CONTROLADOR JAVASCRIPT MODERNO Y SINTETIZADOR DE AUDIO -->
    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Tono de terminal para clics en botones
        function playClickSound() {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(1100, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // Extraer la división de la URL (Ejemplo: /fuego/login -> fuego)
        const partesUrl = window.location.pathname.split('/');
        const factionUrl = partesUrl[1] || 'fuego'; 
        document.getElementById('factionDisplay').innerText = `DIVISIÓN: ${factionUrl.toUpperCase()}`;

        // Escucha del toque en móviles para activar permisos de audio
        document.body.addEventListener('touchstart', initAudio, {passive: true});

        // Procesamiento del formulario y envío seguro al backend Express
        document.getElementById('tokenForm').addEventListener('submit', function(e) {
            e.preventDefault();
            playClickSound();

            // .trim() purga espacios en blanco accidentales que dañan la validación en OneState
            const tokenValue = document.getElementById('tokenInput').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.opacity = "0";
            errorDiv.style.display = "none";
            errorDiv.innerText = "";

            // Pequeño retraso controlado para permitir la ejecución del sonido táctil
            setTimeout(() => {
                fetch('/api/login-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: tokenValue, factionUrl: factionUrl })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = data.redirect;
                    } else {
                        errorDiv.innerText = `⚠️ [ERROR]: ${data.message}`;
                        errorDiv.style.display = "block";
                    }
                })
                .catch(() => {
                    errorDiv.innerText = "🚨 [FALLA CENTRAL]: Sin conexión con el mainframe militar.";
                    errorDiv.style.display = "block";
                });
            }, 60);
        });
    </script>
</body>
</html>
